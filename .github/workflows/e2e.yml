name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel stale runs when a new commit is pushed to the same ref so PRs don't pile up CI minutes.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install addon to local Maven repo
        run: mvn -B -ntp install -DskipTests

      - name: Build sample app (production)
        working-directory: examples/spring-boot-sample
        run: mvn -B -ntp -DskipTests package -Pproduction

      - name: Install Playwright dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
